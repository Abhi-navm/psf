[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx/error.log
stdout_logfile=/var/log/nginx/access.log
priority=10

[program:backend]
command=/opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
directory=/app/backend
autostart=true
autorestart=true
stderr_logfile=/app/backend/logs/backend.err.log
stdout_logfile=/app/backend/logs/backend.out.log
environment=PATH="/opt/venv/bin:%(ENV_PATH)s",PYTHONPATH="/app/backend"
priority=20

[program:celery-worker]
command=/opt/venv/bin/celery -A app.tasks.celery_app worker --loglevel=info -Q default,video,analysis,runpod --pool=threads --concurrency=20
directory=/app/backend
autostart=true
autorestart=true
stderr_logfile=/app/backend/logs/celery.err.log
stdout_logfile=/app/backend/logs/celery.out.log
environment=PATH="/opt/venv/bin:%(ENV_PATH)s",PYTHONPATH="/app/backend",HF_HUB_OFFLINE="1",TRANSFORMERS_OFFLINE="1"
priority=30
stopwaitsecs=600
killasgroup=true

[program:frontend]
command=/usr/bin/npm start
directory=/app/frontend
autostart=true
autorestart=true
stderr_logfile=/app/backend/logs/frontend.err.log
stdout_logfile=/app/backend/logs/frontend.out.log
environment=PORT="3000",NEXT_PUBLIC_API_URL="http://localhost:8000"
priority=40

[group:app]
programs=nginx,backend,celery-worker,frontend
priority=999
